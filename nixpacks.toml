# Explicit nixpacks install phase. Restores the pattern that was working prior
# to commit 3171ff2 (which dropped this file in favour of NIXPACKS_INSTALL_CMD).
# The env-var-only approach ended up running a cached "npm install && cd bot &&
# npm install" command that failed when `bot/` wasn't at the expected relative
# path — 5 consecutive builds broke on `cd: bot: No such file or directory`.
#
# The defensive `[ -d bot ]` guard makes the install work whether Railway's
# service root is the repo root (with `bot/` as a subdirectory) or `bot/`
# itself (in which case we're already inside it).
#
# NOTE: Railpack is the active builder — railpack.json is the source of truth
# for the Chromium runtime apt packages. This file is the fallback for builds
# that go through nixpacks; the aptPkgs array below mirrors railpack.json's
# `deploy.aptPackages` so a nixpacks build still gets the glib/nss/etc. that
# Playwright's Chromium loads at runtime. Without these, `chromium.launch()`
# exits 127 with "error while loading shared libraries: libglib-2.0.so.0".

[phases.setup]
aptPkgs = [
  "libcairo2",
  "libpango-1.0-0",
  "libpangocairo-1.0-0",
  "libjpeg62-turbo",
  "libgif7",
  "librsvg2-2",
  "libpixman-1-0",
  "libasound2",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libgbm1",
  "libglib2.0-0",
  "libnspr4",
  "libnss3",
  "libx11-6",
  "libxcb1",
  "libxcomposite1",
  "libxdamage1",
  "libxext6",
  "libxfixes3",
  "libxkbcommon0",
  "libxrandr2",
  "fonts-liberation",
  "fonts-noto-color-emoji"
]

[phases.install]
cmds = [
  "npm install",
  "[ -d bot ] && (cd bot && npm install) || echo 'bot/ subdir absent — already inside it, skipping second install'"
]
