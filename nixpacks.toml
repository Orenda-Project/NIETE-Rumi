# Nixpacks build config for the bot service (Web + SQS worker share the same image).
#
# Why this file exists — sqs-worker's coaching report_generation job launches a
# Playwright/Chromium instance to render the hero PNG. On 2026-07-13 the render
# crashed with `chrome-headless-shell: error while loading shared libraries:
# libglib-2.0.so.0` — Chromium's runtime .so dependencies were missing from the
# Railway image (postinstall installed the browser binary but not system libs).
# Falling back to the PDFKit renderer meant teachers received a broken
# "0% Not Observed" PDF instead of the FICO celebration card.
#
# Adding aptPkgs here declaratively is safer than relying on
# `playwright install --with-deps` — it works whether or not sudo is available
# in the Nixpacks build env, and it survives a plain `railway up --ci`.
[phases.setup]
aptPkgs = [
  "libglib2.0-0",
  "libnss3",
  "libnspr4",
  "libatk1.0-0",
  "libatk-bridge2.0-0",
  "libcups2",
  "libdbus-1-3",
  "libdrm2",
  "libxkbcommon0",
  "libxcomposite1",
  "libxdamage1",
  "libxfixes3",
  "libxrandr2",
  "libgbm1",
  "libpango-1.0-0",
  "libcairo2",
  "libasound2",
  "libatspi2.0-0",
  "libxshmfence1"
]
