# Gitleaks configuration for the Rumi Platform OSS repo.
# Goal: block any real secret (yours OR a contributor's) from ever being committed.
# We extend gitleaks' default ruleset and add a few explicit key SHAPES.
#
# IMPORTANT: this file contains only generic key *patterns*, never any real key,
# project ref, or phone number. The deployment-specific denylist (an operator's
# own Supabase ref, phone numbers, etc.) is intentionally NOT here — those values
# must never live in this public repo in the first place.

title = "Rumi Platform secret scan"

[extend]
useDefault = true

# --- Explicit key shapes (defense in depth over the default rules) ----------

[[rules]]
id = "openrouter-key"
description = "OpenRouter API key"
regex = '''sk-or-v1-[0-9a-fA-F]{32,}'''

[[rules]]
id = "anthropic-key"
description = "Anthropic API key"
regex = '''sk-ant-[a-zA-Z0-9_-]{24,}'''

[[rules]]
id = "supabase-access-token"
description = "Supabase personal/access token"
regex = '''sbp_[0-9a-fA-F]{40,}'''

[[rules]]
id = "google-api-key"
description = "Google / Gemini API key"
regex = '''AIza[0-9A-Za-z_\-]{35}'''

[[rules]]
id = "openai-key"
description = "OpenAI API key"
regex = '''sk-[A-Za-z0-9]{20}T3BlbkFJ[A-Za-z0-9]{20}'''

[[rules]]
id = "credential-assignment-uuid"
description = "UUID assigned to a credential variable (e.g. RAILWAY_ACCOUNT_TOKEN=<uuid>)"
# Bare UUIDs aren't in gitleaks' default ruleset, so a token-shaped UUID would
# otherwise sail through — this is exactly what leaked in dashboard/docs.
regex = '''(?i)(?:token|secret|password|api[_-]?key|access[_-]?token|account[_-]?token|service[_-]?role[_-]?key)["']?\s*[:=]\s*["']?[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}'''

[[rules]]
id = "credential-assignment-longtoken"
description = "Long contiguous high-entropy value assigned to a credential variable"
regex = '''(?i)(?:token|secret|password|api[_-]?key|access[_-]?token|account[_-]?token|service[_-]?role[_-]?key)["']?\s*[:=]\s*["']?[A-Za-z0-9]{32,}'''

# --- Allowlist: placeholders, tests, this config ----------------------------
# NOTE: docs/ is intentionally NOT path-allowlisted — docs MUST be scanned for real
# secrets (a live token leaked into dashboard/docs once). Placeholders in docs are
# covered by the regex allowlist below instead.

[allowlist]
description = "Template placeholders, test fixtures, and this config are not leaks"
paths = [
  '''\.env\.template$''',
  '''\.env\.example$''',
  '''(^|/)tests/''',
  '''(^|/)__tests__/''',
  '''\.test\.js$''',
  '''\.gitleaks\.toml$''',
  '''(^|/)bot/fonts/''',
]
regexes = [
  '''your-[a-z-]*-?(key|token|id|secret)''',
  '''<[a-z][a-z0-9 _-]*>''',
  '''sk-or-v1-\.\.\.''',
  '''(?i)CHANGEME''',
  '''(?i)need-to-get''',
  '''example\.com''',
  '''your-project\.supabase\.co''',
  '''YOUR_[A-Z_]+''',
]
