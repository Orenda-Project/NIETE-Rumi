name: secret-scan

# Blocks any commit/PR that introduces a credential. Runs on every push and PR.
#
# We run the gitleaks CLI binary directly (MIT-licensed, free) rather than the
# gitleaks GitHub Action, because that Action requires a paid license key for
# organization-owned repos. A clone-friendly OSS secret scan must stay free.

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install gitleaks (latest release binary)
        run: |
          set -euo pipefail
          VERSION=$(curl -sSfL https://api.github.com/repos/gitleaks/gitleaks/releases/latest \
            | grep -oE '"tag_name": "v[^"]+"' | head -1 | grep -oE '[0-9.]+')
          echo "gitleaks v${VERSION}"
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo mv gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree for secrets
        run: gitleaks detect --no-git --source . --config .gitleaks.toml --redact --no-banner --verbose
